[pytest]
asyncio_mode = auto
markers =
    unit: Code-only tests — no network calls required (fast, runs anywhere)
    llm: LLM-involved tests — requires GEMINI_API_KEY set in environment

# Run unit tests by default. Use:
#   pytest -m unit       → code-only tests (no credentials needed)
#   pytest -m llm        → LLM routing tests (requires real GEMINI_API_KEY)
#   pytest               → all tests
